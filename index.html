<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>G BANK</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  transition:0.3s;
}

.light {
  background:#f1f5f9;
  color:black;
}

.splash {
  position:fixed;
  width:100%;
  height:100%;
  background:#22c55e;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:bold;
  z-index:999;
}

.hidden { display:none; }

.header {
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.card {
  background:#1e293b;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  background:#22c55e;
  color:white;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.page { display:none; }
.active { display:block; }

.demo {
  text-align:center;
  font-size:12px;
  color:gray;
}
</style>
</head>

<body>

<div id="splash" class="splash">G BANK</div>

<div class="header">G BANK</div>

<div id="login" class="card">
<h3>Login</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="biometria()">Entrar com digital</button>
</div>

<div id="app" style="display:none">

<div id="home" class="page active">
<div class="card">
<h2 id="saldo">R$ 0</h2>
<button onclick="toggleTema()">🌗 Alternar tema</button>
</div>

<div class="card">
<input id="nome" placeholder="Nome">
<input id="valor" type="number" placeholder="Valor">
<button onclick="add()">Adicionar</button>
</div>

<div class="card">
<ul id="lista"></ul>
</div>
</div>

<div id="grafico" class="page">
<div class="card">
<canvas id="chart"></canvas>
</div>
</div>

</div>

<div class="nav">
<span onclick="nav('home')">🏠</span>
<span onclick="nav('grafico')">📊</span>
</div>

<p class="demo">⚠️ DEMO</p>

<script>
let saldo = localStorage.getItem("saldo") ? parseFloat(localStorage.getItem("saldo")) : 1000;
let extrato = localStorage.getItem("extrato") ? JSON.parse(localStorage.getItem("extrato")) : [];
let userSaved = localStorage.getItem("user");

let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

setTimeout(()=>document.getElementById("splash").classList.add("hidden"),2000);

function salvar(){
  localStorage.setItem("saldo", saldo);
  localStorage.setItem("extrato", JSON.stringify(extrato));
}

function atualizar(){
  document.getElementById("saldo").innerText="R$ "+saldo;

  let lista=document.getElementById("lista");
  lista.innerHTML="";
  extrato.forEach(e=>{
    let li=document.createElement("li");
    li.innerText=e;
    lista.appendChild(li);
  });

  atualizarGrafico();
}

function login(){
  let u=document.getElementById("user").value;
  if(!u) return;

  localStorage.setItem("user",u);

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  atualizar();
}

function biometria(){
  alert("Biometria reconhecida (DEMO)");
  login();
}

function add(){
  let nome=document.getElementById("nome").value;
  let valor=parseFloat(document.getElementById("valor").value);
  if(!nome||isNaN(valor)) return;

  saldo+=valor;
  extrato.unshift(nome+" - R$ "+valor);

  audio.play();
  salvar();
  atualizar();
}

function nav(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

function atualizarGrafico(){
  let valores=extrato.map(e=>parseFloat(e.split("R$ ")[1])||0);

  new Chart(document.getElementById('chart'), {
    type:'line',
    data:{
      labels:valores.map((_,i)=>"T"+i),
      datasets:[{data:valores}]
    }
  });
}

function toggleTema(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
