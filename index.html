<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>G BANK</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.saldo-box {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
}

.saldo-box h1 {
  font-size: 32px;
}

.card {
  background: #1e293b;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  padding: 10px;
  border-bottom: 1px solid #334155;
}

.demo {
  text-align: center;
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<div class="header">G BANK</div>

<div id="login" class="card">
<h3>Entrar</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">

<div class="saldo-box">
<p>Saldo disponível</p>
<h1 id="saldo">R$ 0</h1>
</div>

<div class="card">
<input id="valor" type="number" placeholder="Valor">
<input id="nome" placeholder="Nome">
<button onclick="add()">Adicionar transação</button>
</div>

<div class="card">
<h3>Extrato</h3>
<ul id="lista"></ul>
</div>

<button onclick="logout()">Sair</button>

</div>

<p class="demo">⚠️ Aplicação DEMO (simulação)</p>

<script>
let saldo = localStorage.getItem("saldo") ? parseFloat(localStorage.getItem("saldo")) : 1000;
let extrato = localStorage.getItem("extrato") ? JSON.parse(localStorage.getItem("extrato")) : [];

function salvar(){
  localStorage.setItem("saldo", saldo);
  localStorage.setItem("extrato", JSON.stringify(extrato));
}

function atualizar(){
  document.getElementById("saldo").innerText = "R$ " + saldo;
  let lista = document.getElementById("lista");
  lista.innerHTML = "";
  extrato.forEach(e => {
    let li = document.createElement("li");
    li.innerText = e;
    lista.appendChild(li);
  });
}

function login(){
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  atualizar();
}

function logout(){
  location.reload();
}

function add(){
  let nome = document.getElementById("nome").value;
  let valor = parseFloat(document.getElementById("valor").value);

  if(!nome || isNaN(valor)) return;

  saldo += valor;
  let texto = nome + " - R$ " + valor;
  extrato.unshift(texto);

  salvar();
  atualizar();
}
</script>

</body>
</html>
